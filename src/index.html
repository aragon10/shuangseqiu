<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双色球随机抽号</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- 顶部标题栏 -->
    <header class="header">
      <h1>🎱 双色球随机抽号器</h1>
      <p class="subtitle">祝您好运！</p>
    </header>

    <!-- 标签页导航 -->
    <nav class="tabs">
      <button class="tab active" data-tab="generate">摇号</button>
      <button class="tab" data-tab="history">历史记录</button>
      <button class="tab" data-tab="stats">号码统计</button>
    </nav>

    <!-- 摇号页面 -->
    <section id="generate" class="tab-content active">
      <div class="generate-section">
        <div class="controls">
          <div class="input-group">
            <label for="count">生成注数：</label>
            <input type="number" id="count" min="1" max="100" value="1">
            <button id="generateBtn" class="btn btn-primary">摇一摇</button>
          </div>
        </div>

        <!-- 单注结果显示 -->
        <div id="singleResult" class="result-card">
          <h3>摇号结果</h3>
          <div class="balls-container">
            <div class="red-balls" id="redBalls">
              <!-- 红球将在这里动态生成 -->
            </div>
            <div class="blue-ball" id="blueBall">
              <!-- 蓝球将在这里动态生成 -->
            </div>
          </div>
        </div>

        <!-- 批量结果显示 -->
        <div id="batchResult" class="batch-result" style="display: none;">
          <h3>批量结果</h3>
          <div id="batchList" class="batch-list">
            <!-- 批量结果将在这里动态生成 -->
          </div>
        </div>
      </div>
    </section>

    <!-- 历史记录页面 -->
    <section id="history" class="tab-content">
      <div class="history-section">
        <div class="history-header">
          <h3>历史记录</h3>
          <button id="clearHistoryBtn" class="btn btn-danger">清空历史</button>
        </div>
        <div id="historyList" class="history-list">
          <!-- 历史记录将在这里动态生成 -->
        </div>
      </div>
    </section>

    <!-- 号码统计页面 -->
    <section id="stats" class="tab-content">
      <div class="stats-section">
        <h3>号码出现频率统计</h3>
        <div class="stats-chart">
          <div class="chart-group">
            <h4>红球统计 (1-33)</h4>
            <div id="redChart" class="chart">
              <!-- 红球统计图表 -->
            </div>
          </div>
          <div class="chart-group">
            <h4>蓝球统计 (1-16)</h4>
            <div id="blueChart" class="chart">
              <!-- 蓝球统计图表 -->
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="lottery.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
